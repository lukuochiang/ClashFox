<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClashFox</title>
    <script>
      (function(){
        try {
          var t = localStorage.getItem('lastTheme');
          if (t) {
            document.documentElement.setAttribute('data-theme', t);
            if (document.body) document.body.dataset.theme = t;
            else document.addEventListener('DOMContentLoaded', () => {
              document.body.dataset.theme = t;
            });
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="kernel">
    <div class="app">
      <aside class="sidebar" id="menuContainer"></aside>

      <main class="content">
        <header class="topbar" id="topbarContainer"></header>

        <div id="contentRoot" class="content-root">
          <section id="kernel" class="panel active">
            <div class="card install-card">
              <div class="card-header-row">
                <h3 data-i18n="install.title">Install / Update Mihomo</h3>
                <div class="install-header-meta">
                  <div class="install-status" id="installStatus" data-i18n="install.ready">Ready to install.</div>
                </div>
              </div>
              <div class="card-body install-form">
                <div class="install-header" data-i18n="install.hint">
                  Downloads the latest kernel for your architecture and backs up the previous one.
                </div>
                <div class="form-row source-row">
                  <label data-i18n="install.github">Release Source</label>
                  <div class="kernel-source-picker" id="kernelSourcePicker" role="radiogroup">
                    <button type="button" class="kernel-source-card is-primary" data-source-value="MetaCubeX" role="radio" aria-checked="false">
                      <span class="kernel-source-mainline">
                        <span class="kernel-source-name">MetaCubeX</span>
                        <span class="kernel-source-tag is-recommended" data-i18n="install.sourceMetaTag">[Recommended]</span>
                      </span>
                      <span class="kernel-source-line" data-i18n="install.sourceMetaLine">Recommended · Official Stable</span>
                      <span class="kernel-source-desc" data-i18n="install.sourceMetaDesc">Officially maintained, stable updates, recommended.</span>
                      <span class="kernel-source-desc" data-i18n="install.sourceMetaSupport">Supports historical version installation.</span>
                    </button>
                    <button type="button" class="kernel-source-card" data-source-value="vernesong" role="radio" aria-checked="false">
                      <span class="kernel-source-mainline">
                        <span class="kernel-source-name">vernesong</span>
                        <span class="kernel-source-tag is-try" data-i18n="install.sourceTryTag">[Try]</span>
                      </span>
                      <span class="kernel-source-line" data-i18n="install.sourceVernesongLine">Community Edition · Faster Updates</span>
                      <span class="kernel-source-desc" data-i18n="install.sourceVernesongDesc">May be unstable, latest version only.</span>
                    </button>
                  </div>
                  <select id="githubUser" class="is-hidden" aria-hidden="true" tabindex="-1" data-native-select="true">
                    <option value="MetaCubeX">MetaCubeX</option>
                    <option value="vernesong">vernesong</option>
                  </select>
                </div>
                <div class="form-row is-hidden" id="installVersionRow">
                  <label data-i18n="install.version">Version</label>
                  <div class="kernel-version-picker">
                    <select id="installVersionMode">
                      <option value="latest" data-i18n="install.versionLatestOption">Latest Version</option>
                      <option value="manual" data-i18n="install.versionManualOption">Manual Input</option>
                    </select>
                    <button
                      type="button"
                      class="btn ghost compact version-refresh-btn is-hidden"
                      id="installVersionRefreshBtn"
                      data-i18n="install.versionRefresh"
                    >Refresh</button>
                    <input
                      id="installVersion"
                      class="is-hidden"
                      type="text"
                      data-i18n-placeholder="install.versionPlaceholder"
                      placeholder="e.g. v1.19.0"
                    />
                  </div>
                </div>
                <div class="form-row install-current-row">
                  <label><span data-i18n="labels.current">Current</span> <span data-i18n="status.kernel">Kernel</span></label>
                  <div class="install-current-kernel" id="installCurrentKernel">-</div>
                </div>
              </div>
              <div class="action-row">
                <button class="btn primary" id="installBtn" data-i18n="install.installOneClickAction">One-click Install / Update</button>
                <button class="btn danger" id="cancelInstallBtn" data-i18n="install.cancel">Cancel</button>
              </div>
            </div>

<!--            <div class="card">-->
<!--              <h3 class="iconized current-kernel-icon"><span data-i18n="labels.current">Current</span> <span data-i18n="status.kernel">Kernel</span></h3>-->
<!--              <div class="table" id="kernelCurrentTable"></div>-->
<!--            </div>-->

            <div class="card">
              <div class="card-header-row kernel-list-header">
                <h3 data-i18n="install.kernelsTitle">Kernel List</h3>
                <div class="control-actions">
                  <button class="icon-btn ghost small kernel-header-icon-btn kernel-restart-btn" id="kernelRestart" type="button" data-tip-key="actions.restart" data-position="left" data-native-title="false" aria-label="Restart">
                    <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                      <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"></path>
                    </svg>
                  </button>
                  <button class="icon-btn ghost small kernel-header-icon-btn kernel-refresh-btn" id="kernelRefresh" type="button" data-tip-key="actions.refresh" data-position="bottom" data-native-title="false" aria-label="Refresh">
                    <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                      <path d="M17.64 6.36A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.76-4.24L14 10h6V4l-2.36 2.36Z"></path>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="card-body">
                <div class="table" id="kernelTable"></div>
                <div class="pagination">
                  <div class="page-controls">
                    <button class="btn ghost" id="kernelPrev" data-i18n="pagination.prev">Prev</button>
                    <div class="page-info" id="kernelPageInfo">1 / 1</div>
                    <button class="btn ghost" id="kernelNext" data-i18n="pagination.next">Next</button>
                  </div>
                  <div class="page-size">
                    <span data-i18n="pagination.size">Per page</span>
                    <select id="kernelPageSize">
                      <option value="5">5</option>
                      <option value="10" selected>10</option>
                      <option value="20">20</option>
                      <option value="50">50</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <div id="overlayRoot"></div>
    <script src="../utils/locale-utils.js"></script>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>
