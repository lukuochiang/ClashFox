<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClashFox Tray Menu</title>
  <link rel="stylesheet" href="../css/tray-menu.css" />
</head>
<body>
  <div id="trayStage" class="tray-stage side-right">
    <div id="menuRoot" class="menu-root">
      <div id="menuHeader" class="menu-header"></div>
      <div id="menuChart" class="menu-chart is-hidden">
        <div class="menu-chart-body">
          <div class="menu-chart-overlay">
            <div id="menuChartTopLabel" class="menu-chart-label top">-</div>
            <div id="menuChartBottomLabel" class="menu-chart-label bottom">-</div>
          </div>
          <div class="menu-chart-overlay right">
            <div id="menuChartTopTotal" class="menu-chart-label top total">-</div>
            <div id="menuChartBottomTotal" class="menu-chart-label bottom total">-</div>
          </div>
          <svg class="menu-chart-svg" viewBox="0 0 100 60" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="trayDownGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#53b8ff" stop-opacity="0.98" />
                <stop offset="100%" stop-color="#53b8ff" stop-opacity="0.18" />
              </linearGradient>
              <linearGradient id="trayUpGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#d88cff" stop-opacity="0.98" />
                <stop offset="100%" stop-color="#d88cff" stop-opacity="0.18" />
              </linearGradient>
            </defs>
            <line class="chart-baseline" x1="0" y1="30" x2="100" y2="30"></line>
            <g id="menuChartBars"></g>
          </svg>
        </div>
        <div class="menu-chart-footer">
          <span id="menuChartLeftTime">-</span>
          <span id="menuChartRightTime">now</span>
        </div>
      </div>
      <div id="menuProviderTraffic" class="menu-provider-traffic is-hidden"></div>
      <div id="menuList" class="menu-list"></div>
    </div>
  </div>
  <script src="../js/tray-menu.js"></script>
</body>
</html>
