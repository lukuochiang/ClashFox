<div class="brand">
  <div class="brand-mark">
    <img class="logo-night" src="../assets/logo_night.png" alt="ClashFox logo" />
    <img class="logo-light" src="../assets/logo_light.png" alt="ClashFox logo" />
  </div>
  <div class="brand-copy">
    <div class="brand-title" id="appName">ClashFox</div>
    <div class="brand-sub" id="appVersion">v0.0.0</div>
  </div>
  <div class="sidebar-actions">
    <button class="sidebar-collapse-toggle" id="sidebarCollapseToggle" type="button" title="Collapse sidebar" aria-label="Collapse sidebar">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="14 6 8 12 14 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
      </svg>
    </button>
    <button class="icon-btn theme-toggle sidebar-theme-toggle" id="themeToggle" data-tip-key="theme.toDay">
      <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 4.5a.9.9 0 0 1 .9.9v1.4a.9.9 0 1 1-1.8 0V5.4a.9.9 0 0 1 .9-.9Zm0 10.8a3.6 3.6 0 1 0 0-7.2 3.6 3.6 0 0 0 0 7.2Zm7.1-2.4a.9.9 0 0 1 .9-.9h1.4a.9.9 0 1 1 0 1.8h-1.4a.9.9 0 0 1-.9-.9Zm-15.5 0a.9.9 0 0 1 .9-.9h1.4a.9.9 0 0 1 0 1.8H4.5a.9.9 0 0 1-.9-.9Zm12.2-5.4a.9.9 0 0 1 1.27-1.27l1 1a.9.9 0 0 1-1.27 1.27l-1-1Zm-8.4 8.4a.9.9 0 0 1 1.27-1.27l1 1a.9.9 0 1 1-1.27 1.27l-1-1Zm8.4 1a.9.9 0 0 1 1.27 0l1 1a.9.9 0 0 1-1.27 1.27l-1-1a.9.9 0 0 1 0-1.27Zm-8.4-8.4a.9.9 0 0 1 0-1.27l1-1a.9.9 0 1 1 1.27 1.27l-1 1a.9.9 0 0 1-1.27 0Z"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12.7 3.2a.9.9 0 0 1 .9 1.08 7.2 7.2 0 1 0 6.04 9.96.9.9 0 0 1 1.25 1.06 9 9 0 1 1-8.47-12.1.9.9 0 0 1 .28 0Z"/>
      </svg>
    </button>
</div>
</div>

<div class="menu-brand-divider" aria-hidden="true"></div>

<div class="nav-scroll" id="navScroll">
  <nav class="nav" id="primaryNav">
    <button class="nav-btn" data-page="overview" data-i18n="nav.status">Overview</button>
    <button class="nav-btn" data-page="kernel" data-i18n="nav.kernel">Kernel</button>
    <button class="nav-btn" data-page="config" data-i18n="nav.config">Config</button>
    <button class="nav-btn" data-page="logs" data-i18n="nav.logs">Logs</button>
    <button class="nav-btn" id="navDashboard" data-tray-action="open-dashboard" data-i18n="nav.dashboard">Dashboard</button>
    <button class="nav-btn" id="navTrackers" data-tray-action="open-worldwide" data-i18n="nav.trackers">Trackers</button>
    <button class="nav-btn" id="navFoxboard" data-tray-action="open-foxboard" data-i18n="nav.foxboard">Foxboard</button>
  </nav>

  <section class="fox-rank-panel" id="foxRankPanel">
    <button class="fox-rank-card" id="foxRankCard" type="button" aria-label="Open Fox Rank details">
      <div class="fox-rank-header">
        <div class="fox-rank-head-main">
          <div class="fox-rank-label">Fox Rank</div>
          <div class="fox-rank-tier" id="foxRankTierName">Fox Pup</div>
        </div>
        <div class="fox-rank-level" id="foxRankLevelText">Lv. 01</div>
      </div>
      <div class="fox-rank-progress">
        <div class="fox-rank-progress-track">
          <div class="fox-rank-progress-fill" id="foxRankProgressFill"></div>
        </div>
        <div class="fox-rank-progress-text" id="foxRankProgressText">0 / 200 XP</div>
      </div>
      <div class="fox-rank-metrics">
        <div class="fox-rank-metric">
          <div class="fox-rank-metric-label">Usage</div>
          <div class="fox-rank-metric-value" id="foxRankUsageValue">0h</div>
        </div>
        <div class="fox-rank-metric">
          <div class="fox-rank-metric-label">Stability</div>
          <div class="fox-rank-metric-value" id="foxRankStabilityValue">0d</div>
        </div>
        <div class="fox-rank-metric">
          <div class="fox-rank-metric-label">Quality</div>
          <div class="fox-rank-metric-value" id="foxRankQualityValue">Bronze</div>
        </div>
      </div>
    </button>
  </section>

  <div class="sidebar-fox-divider-host" id="sidebarFoxDividerHost"></div>

  <nav class="nav nav-bottom">
    <button class="nav-btn" id="navSettingsMain" data-page="settings" data-i18n="nav.settings">Settings</button>
    <button class="nav-btn" id="navHelpMain" data-page="help" data-i18n="nav.help">Help</button>
  </nav>
</div>

<div class="fox-rank-detail-modal" id="foxRankDetailModal" hidden>
  <div class="fox-rank-detail-backdrop"></div>
  <div class="fox-rank-detail-card">
    <div class="fox-rank-detail-head">
      <div class="fox-rank-detail-title-wrap">
        <div class="fox-rank-detail-kicker">Fox Rank</div>
        <div class="fox-rank-detail-title" id="foxRankDetailTier">Fox Pup</div>
        <div class="fox-rank-detail-subtitle">Daily accumulation.</div>
      </div>
      <button class="fox-rank-detail-close" id="foxRankDetailClose" type="button" aria-label="Close">×</button>
    </div>

    <div class="fox-rank-detail-hero">
      <div class="fox-rank-detail-level" id="foxRankDetailLevel">Lv. 1</div>
      <div class="fox-rank-detail-xp" id="foxRankDetailXp">0 / 200 XP</div>
    </div>

    <div class="fox-rank-detail-grid">
      <div class="fox-rank-detail-stat">
        <span>Usage</span>
        <strong id="foxRankDetailUsage">0h</strong>
      </div>
      <div class="fox-rank-detail-stat">
        <span>Stability</span>
        <strong id="foxRankDetailStability">0d</strong>
      </div>
      <div class="fox-rank-detail-stat">
        <span>Quality</span>
        <strong id="foxRankDetailQuality">Bronze • 0%</strong>
      </div>
    </div>

    <div class="fox-rank-detail-body">
      <section class="fox-rank-detail-section fox-rank-detail-section-log">
        <h4>Growth Log</h4>
        <div class="fox-rank-log-list" id="foxRankLogList"></div>
      </section>

      <section class="fox-rank-detail-section fox-rank-detail-section-badges">
        <h4>Badge Wall</h4>
        <div class="fox-rank-badge-list" id="foxRankBadgeList"></div>
      </section>
    </div>

    <section class="fox-rank-detail-actions">
      <button class="btn" id="foxRankCopySummaryBtn" type="button">Copy Summary</button>
      <button class="btn primary" id="foxRankExportPngBtn" type="button">Export PNG</button>
    </section>
  </div>
</div>

<div class="top-nav-more" id="topNavMore">
  <button class="icon-btn ghost top-nav-more-btn" id="topNavMoreBtn" type="button" aria-label="More">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="5" r="1.8"></circle>
      <circle cx="12" cy="12" r="1.8"></circle>
      <circle cx="12" cy="19" r="1.8"></circle>
    </svg>
  </button>
  <div class="top-nav-more-menu" id="topNavMoreMenu">
    <button class="top-nav-more-item nav-btn" id="navSettingsOverflow" data-page="settings" data-i18n="nav.settings">Settings</button>
    <button class="top-nav-more-item nav-btn" id="navHelpOverflow" data-page="help" data-i18n="nav.help">Help</button>
  </div>
</div>
