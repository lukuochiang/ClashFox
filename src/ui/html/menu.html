<div class="brand">
  <button class="brand-mark" id="sidebarCollapseToggle" type="button" title="Toggle sidebar" aria-label="Toggle sidebar">
    <img class="logo-night" src="../assets/logo-night.png" alt="ClashFox logo" />
    <img class="logo-light" src="../assets/logo-light.png" alt="ClashFox logo" />
  </button>
  <div class="brand-copy">
    <div class="brand-title" id="appName">ClashFox</div>
    <div class="brand-sub" id="appVersion">v0.0.0</div>
  </div>
  <div class="sidebar-actions">
    <button class="sidebar-collapse-toggle" id="sidebarCollapseToggle" type="button" title="Collapse sidebar" aria-label="Collapse sidebar">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="14 6 8 12 14 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
      </svg>
    </button>
    <button class="icon-btn theme-toggle sidebar-theme-toggle" id="themeToggle" data-tip-key="theme.toDay">
      <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 4.5a.9.9 0 0 1 .9.9v1.4a.9.9 0 1 1-1.8 0V5.4a.9.9 0 0 1 .9-.9Zm0 10.8a3.6 3.6 0 1 0 0-7.2 3.6 3.6 0 0 0 0 7.2Zm7.1-2.4a.9.9 0 0 1 .9-.9h1.4a.9.9 0 1 1 0 1.8h-1.4a.9.9 0 0 1-.9-.9Zm-15.5 0a.9.9 0 0 1 .9-.9h1.4a.9.9 0 0 1 0 1.8H4.5a.9.9 0 0 1-.9-.9Zm12.2-5.4a.9.9 0 0 1 1.27-1.27l1 1a.9.9 0 0 1-1.27 1.27l-1-1Zm-8.4 8.4a.9.9 0 0 1 1.27-1.27l1 1a.9.9 0 1 1-1.27 1.27l-1-1Zm8.4 1a.9.9 0 0 1 1.27 0l1 1a.9.9 0 0 1-1.27 1.27l-1-1a.9.9 0 0 1 0-1.27Zm-8.4-8.4a.9.9 0 0 1 0-1.27l1-1a.9.9 0 1 1 1.27 1.27l-1 1a.9.9 0 0 1-1.27 0Z"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12.7 3.2a.9.9 0 0 1 .9 1.08 7.2 7.2 0 1 0 6.04 9.96.9.9 0 0 1 1.25 1.06 9 9 0 1 1-8.47-12.1.9.9 0 0 1 .28 0Z"/>
      </svg>
    </button>
</div>
</div>

<div class="menu-brand-divider" aria-hidden="true"></div>

<div class="nav-scroll" id="navScroll">
  <nav class="nav" id="primaryNav">
    <button class="nav-btn" data-page="overview" data-i18n="nav.status">Overview</button>
    <button class="nav-btn" data-page="kernel" data-i18n="nav.kernel">Kernel</button>
    <button class="nav-btn" data-page="config" data-i18n="nav.config">Config</button>
    <button class="nav-btn" data-page="logs" data-i18n="nav.logs">Logs</button>
    <div class="nav-tools-group" id="navToolsGroup">
      <div class="nav-tools-list" id="navToolsList">
        <button class="nav-btn" id="navDashboard" data-tray-action="open-dashboard" data-i18n="nav.dashboard">Dashboard</button>
        <button class="nav-btn" id="navTrackers" data-tray-action="open-worldwide" data-i18n="nav.trackers">Trackers</button>
        <button class="nav-btn" id="navFoxboard" data-tray-action="open-foxboard" data-i18n="nav.foxboard">Foxboard</button>
      </div>
    </div>
  </nav>

  <section class="fox-rank-panel" id="foxRankPanel">
    <button class="fox-rank-pill" id="foxRankPill" type="button" aria-expanded="false">
      <span class="fox-rank-pill-title" data-fox-rank-ui="title">Fox Rank</span>
      <span class="fox-rank-pill-tier" id="foxRankPillTier">S1 · 1/5</span>
      <span class="fox-rank-pill-boost" id="foxRankPillBoost">+0%</span>
      <span class="fox-rank-pill-caret" aria-hidden="true">▾</span>
    </button>
    <button class="fox-rank-card" id="foxRankCard" type="button" aria-label="Open Fox Rank details">
      <div class="fox-rank-ambient" aria-hidden="true">
        <span class="fox-rank-halo fox-rank-halo-a"></span>
        <span class="fox-rank-halo fox-rank-halo-b"></span>
        <span class="fox-rank-particle fox-rank-particle-a"></span>
        <span class="fox-rank-particle fox-rank-particle-b"></span>
        <span class="fox-rank-particle fox-rank-particle-c"></span>
      </div>
      <div class="fox-rank-header">
        <div class="fox-rank-head-main">
          <div class="fox-rank-label" data-fox-rank-ui="title">Fox Rank</div>
          <div class="fox-rank-tier" id="foxRankTierName">Fox Pup</div>
        </div>
        <div class="fox-rank-level" id="foxRankLevelText">Lv. 01</div>
      </div>
      <div class="fox-rank-status-row">
        <div class="fox-rank-boost" id="foxRankBoostHint">Rank Boost +0%</div>
        <div class="fox-rank-warning" id="foxRankWarningChip">Ascend soon</div>
      </div>
      <div class="fox-rank-progress">
        <div class="fox-rank-progress-track">
          <div class="fox-rank-progress-fill" id="foxRankProgressFill"></div>
        </div>
        <div class="fox-rank-progress-text" id="foxRankProgressText">0 / 200 XP</div>
      </div>
      <div class="fox-rank-metrics">
        <div class="fox-rank-metric">
          <div class="fox-rank-metric-label" data-fox-rank-ui="usage">Usage</div>
          <div class="fox-rank-metric-value" id="foxRankUsageValue">0h</div>
        </div>
        <div class="fox-rank-metric">
          <div class="fox-rank-metric-label" data-fox-rank-ui="stability">Stability</div>
          <div class="fox-rank-metric-value" id="foxRankStabilityValue">0d</div>
        </div>
        <div class="fox-rank-metric">
          <div class="fox-rank-metric-label" data-fox-rank-ui="quality">Quality</div>
          <div class="fox-rank-metric-value" id="foxRankQualityValue">Bronze</div>
        </div>
      </div>
      <div class="fox-rank-footer">
        <div class="fox-rank-footer-pill"><span data-fox-rank-ui="explore">Explore</span> <strong id="foxRankExploreCount">0</strong></div>
        <div class="fox-rank-footer-pill" id="foxRankSkinHint">Skin: Campfire</div>
      </div>
    </button>
  </section>

  <div class="sidebar-fox-divider-host" id="sidebarFoxDividerHost"></div>

  <nav class="nav nav-bottom">
    <button class="nav-btn" id="navSettingsMain" data-page="settings" data-i18n="nav.settings">Settings</button>
    <button class="nav-btn" id="navHelpMain" data-page="help" data-i18n="nav.help">Help</button>
  </nav>
</div>

<div class="fox-rank-detail-modal" id="foxRankDetailModal" hidden>
  <div class="fox-rank-detail-backdrop"></div>
  <div class="fox-rank-detail-card" id="foxRankDetailCard">
    <div class="fox-rank-detail-ambient" aria-hidden="true">
      <span class="fox-rank-detail-halo fox-rank-detail-halo-a"></span>
      <span class="fox-rank-detail-halo fox-rank-detail-halo-b"></span>
      <span class="fox-rank-detail-particle fox-rank-detail-particle-a"></span>
      <span class="fox-rank-detail-particle fox-rank-detail-particle-b"></span>
      <span class="fox-rank-detail-particle fox-rank-detail-particle-c"></span>
    </div>
    <div class="fox-rank-detail-head">
      <div class="fox-rank-detail-title-wrap">
        <div class="fox-rank-detail-kicker" data-fox-rank-ui="title">Fox Rank</div>
        <div class="fox-rank-detail-title" id="foxRankDetailTier">Fox Pup</div>
        <div class="fox-rank-detail-subtitle" id="foxRankDetailSubtitle">Daily accumulation.</div>
      </div>
      <button class="fox-rank-detail-close" id="foxRankDetailClose" type="button" aria-label="Close">×</button>
    </div>

    <div class="fox-rank-detail-hero">
      <div class="fox-rank-detail-level" id="foxRankDetailLevel">Lv. 1</div>
      <div class="fox-rank-detail-xp" id="foxRankDetailXp">0 / 200 XP</div>
    </div>

    <div class="fox-rank-detail-grid">
      <div class="fox-rank-detail-stat">
        <span data-fox-rank-ui="usage">Usage</span>
        <strong id="foxRankDetailUsage">0h</strong>
      </div>
      <div class="fox-rank-detail-stat">
        <span data-fox-rank-ui="stability">Stability</span>
        <strong id="foxRankDetailStability">0d</strong>
      </div>
      <div class="fox-rank-detail-stat">
        <span data-fox-rank-ui="quality">Quality</span>
        <strong id="foxRankDetailQuality">Bronze • 0%</strong>
      </div>
      <div class="fox-rank-detail-stat">
        <span data-fox-rank-ui="explore">Explore</span>
        <strong id="foxRankDetailExplore">0 hops</strong>
      </div>
      <div class="fox-rank-detail-stat">
        <span data-fox-rank-ui="rankBoost">Rank Boost</span>
        <strong id="foxRankDetailBoost">+0%</strong>
      </div>
    </div>

    <div class="fox-rank-detail-body">
      <section class="fox-rank-detail-section fox-rank-detail-section-weekly">
        <h4 data-fox-rank-ui="weeklyReview">Weekly Review</h4>
        <div class="fox-rank-weekly-card" id="foxRankWeeklyCard"></div>
      </section>

      <section class="fox-rank-detail-section fox-rank-detail-section-progression">
        <div class="fox-rank-section-tabs" id="foxRankSectionTabs">
          <button class="active" id="foxRankTabLog" type="button" data-fox-rank-tab="log" data-fox-rank-ui="growthLog">Growth Log</button>
          <button type="button" id="foxRankTabBadges" data-fox-rank-tab="badges" data-fox-rank-ui="badgeWall">Badge Wall</button>
          <button type="button" id="foxRankTabSkins" data-fox-rank-tab="skins" data-fox-rank-ui="skinUnlocks">Skin Unlocks</button>
        </div>
        <div class="fox-rank-tab-panel active" id="foxRankTabPanelLog" data-fox-rank-panel="log">
          <div class="fox-rank-log-list" id="foxRankLogList"></div>
        </div>
        <div class="fox-rank-tab-panel" id="foxRankTabPanelBadges" data-fox-rank-panel="badges" hidden>
          <div class="fox-rank-badge-list" id="foxRankBadgeList"></div>
        </div>
        <div class="fox-rank-tab-panel" id="foxRankTabPanelSkins" data-fox-rank-panel="skins" hidden>
          <div class="fox-rank-skin-list" id="foxRankSkinList"></div>
        </div>
      </section>

    </div>

    <section class="fox-rank-detail-actions">
      <button class="btn" id="foxRankCopySummaryBtn" type="button" data-fox-rank-ui="copySummary">Copy Summary</button>
      <button class="btn" id="foxRankPreviewPngBtn" type="button" data-fox-rank-ui="previewPng">Preview Share Card</button>
      <button class="btn primary" id="foxRankExportPngBtn" type="button" data-fox-rank-ui="exportPng">Export Share Card</button>
    </section>

    <section class="fox-rank-detail-section fox-rank-detail-section-share fox-rank-share-drawer" id="foxRankShareSection" hidden>
      <div class="fox-rank-share-header">
        <h4 data-fox-rank-ui="shareCard">Share Card</h4>
        <button class="close-btn fox-rank-share-close" id="foxRankShareClose" type="button" aria-label="Close Share Card" title="Close Share Card">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3L3 9M3 3l6 6"/>
          </svg>
        </button>
      </div>
      <div class="fox-rank-share-preview" id="foxRankSharePreview"></div>
    </section>
  </div>
</div>

<div class="fox-rank-brief-modal" id="foxRankBriefModal" hidden>
  <div class="fox-rank-brief-backdrop"></div>
  <div class="fox-rank-brief-card">
    <div class="fox-rank-brief-kicker" data-fox-rank-ui="dailyBrief">Daily Fox Rank Brief</div>
    <div class="fox-rank-brief-title" id="foxRankBriefTitle">Camp log synced</div>
    <div class="fox-rank-brief-summary" id="foxRankBriefSummary">Your Fox Rank is warming up.</div>
    <div class="fox-rank-brief-metrics" id="foxRankBriefMetrics"></div>
    <div class="fox-rank-brief-boost" id="foxRankBriefBoost">Rank Boost +0%</div>
    <div class="fox-rank-brief-actions">
      <button class="btn" id="foxRankBriefClose" type="button" data-fox-rank-ui="later">Later</button>
      <button class="btn primary" id="foxRankBriefOpenDetail" type="button" data-fox-rank-ui="openDetail">Open Fox Rank</button>
    </div>
  </div>
</div>
