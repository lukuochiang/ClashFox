<div class="modal update-guide-modal" id="updateGuideModal" aria-hidden="true">
  <div class="modal-card update-guide-card">
    <div class="update-guide-head">
      <div class="modal-title" id="updateGuideTitle">Update Guide</div>
      <button class="update-guide-close" id="updateGuideClose" type="button" aria-label="Close">×</button>
    </div>
    <div class="update-guide-body" id="updateGuideBody">Choose a version channel to continue.</div>
    <div class="update-guide-actions">
      <button class="btn primary update-guide-btn is-hidden" id="updateGuideReleaseBtn" type="button">Update Release</button>
      <button class="btn ghost update-guide-btn is-hidden" id="updateGuideAlphaBtn" type="button">Update to Alpha</button>
    </div>
  </div>
</div>
