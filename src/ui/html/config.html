<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClashFox</title>
    <script>
      (function(){
        try {
          var t = localStorage.getItem('lastTheme');
          if (t) {
            document.documentElement.setAttribute('data-theme', t);
            if (document.body) document.body.dataset.theme = t;
            else document.addEventListener('DOMContentLoaded', () => {
              document.body.dataset.theme = t;
            });
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="config">
    <div class="app">
      <aside class="sidebar" id="menuContainer"></aside>

      <main class="content">
        <header class="topbar" id="topbarContainer"></header>

        <div id="contentRoot" class="content-root">
          <section id="config" class="panel active">
          <div class="card control-card">
            <div class="card-header-row">
              <h3 data-i18n="control.title">Config List</h3>
              <div class="control-actions">
                <button class="icon-btn ghost small control-import-url-btn" id="configsImportUrl" type="button" data-tip-key="control.importUrlTooltip" data-position="bottom" data-native-title="false" aria-label="Import config from URL">
                  <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                    <path d="M8.8 8.8a3 3 0 0 1 4.24 0 .9.9 0 1 0 1.27-1.27 4.8 4.8 0 0 0-6.78 6.78l.57.58a4.8 4.8 0 0 0 6.79 0l2.83-2.83a4.8 4.8 0 0 0 0-6.78 4.8 4.8 0 0 0-6.78 0l-1.2 1.2a.9.9 0 1 0 1.27 1.27l1.2-1.2a3 3 0 0 1 4.24 0 3 3 0 0 1 0 4.24L13.61 13.6a3 3 0 0 1-4.24 0l-.57-.57a3 3 0 0 1 0-4.24Z"></path>
                    <path d="M12 9.5a.9.9 0 0 1 .9.9v4.12l1.33-1.33a.9.9 0 1 1 1.27 1.27l-2.87 2.87a.9.9 0 0 1-1.27 0l-2.87-2.87a.9.9 0 0 1 1.27-1.27l1.34 1.33V10.4a.9.9 0 0 1 .9-.9Z"></path>
                    <path d="M6.3 19.2a.9.9 0 1 0 0 1.8h11.4a.9.9 0 1 0 0-1.8H6.3Z"></path>
                  </svg>
                </button>
                <button class="icon-btn ghost small control-reload-btn" id="configsReload" type="button" data-tip-key="control.reload" data-position="bottom" data-native-title="false" aria-label="Reload config">
                  <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"></path>
                  </svg>
                </button>
                <button class="icon-btn ghost small control-import-btn" id="configsImport" type="button" data-tip-key="control.import" data-position="bottom" data-native-title="false" aria-label="Import config">
                  <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                    <path d="M12 3a1 1 0 0 1 1 1v7h3.6a1 1 0 0 1 .7 1.7l-5.3 5.3a1 1 0 0 1-1.4 0l-5.3-5.3A1 1 0 0 1 6 11h3.6V4a1 1 0 0 1 1-1h1.4ZM5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Z"></path>
                  </svg>
                </button>
                <button class="icon-btn ghost small control-refresh-btn" id="configsRefresh" type="button" data-tip-key="control.refresh" data-position="bottom" data-native-title="false" aria-label="Refresh configs">
                  <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                    <path d="M17.64 6.36A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.76-4.24L14 10h6V4l-2.36 2.36Z"></path>
                  </svg>
                </button>
              </div>
            </div>
            <div class="card-body">
              <div class="table" id="configTable"></div>
              <div class="pagination">
                <div class="page-controls">
                  <button class="btn ghost" id="configPrev" data-i18n="pagination.prev">Prev</button>
                  <div class="page-info" id="configPageInfo">1 / 1</div>
                  <button class="btn ghost" id="configNext" data-i18n="pagination.next">Next</button>
                </div>
                <div class="page-size">
                  <span data-i18n="pagination.size">Per page</span>
                  <select id="configPageSize">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div class="card card-full">
            <div class="card-header-row">
              <h3 data-i18n="control.recommendationsTitle">Recommended Configs</h3>
            </div>
            <div class="card-body">
              <div class="table">
                <table class="app-table recommend-table">
                  <thead>
                  <tr>
                    <th class="index-col" data-i18n="table.index">#</th>
                    <th class="name-col" data-i18n="table.recommendAuthor">Creator</th>
                    <th class="github-col" data-i18n="table.recommendGithub">GitHub URL</th>
                    <th class="dir-col" data-i18n="table.recommendDir">Directory</th>
                    <th class="rating-col" data-i18n="table.recommendRating">Rating</th>
                  </tr>
                  </thead>
                  <tbody id="recommendTableBody"></tbody>
                </table>
              </div>
              <div class="pagination">
                <div class="page-controls">
                  <button class="btn ghost" id="recommendPrev" data-i18n="pagination.prev">Prev</button>
                  <div class="page-info" id="recommendPageInfo">1 / 1</div>
                  <button class="btn ghost" id="recommendNext" data-i18n="pagination.next">Next</button>
                </div>
                <div class="page-size">
                  <span data-i18n="pagination.size">Per page</span>
                  <select id="recommendPageSize">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div class="modal config-url-modal" id="configUrlModal" aria-hidden="true">
            <div class="modal-card config-url-modal-card">
              <div class="modal-title" id="configUrlModalTitle">从 URL 安装配置</div>
              <div class="modal-body" id="configUrlModalHint">你可以从 URL 导入配置。</div>
              <div class="config-url-modal-input-wrap">
                <input id="configUrlInput" type="url" placeholder="https://example.com/config.yaml" autocomplete="off" spellcheck="false" />
              </div>
              <div class="modal-actions">
                <button class="btn ghost" id="configUrlCancel">取消</button>
                <button class="btn primary" id="configUrlConfirm">完成</button>
              </div>
            </div>
          </div>
        </section>
        </div>
      </main>
    </div>
    <div id="overlayRoot"></div>

    <script src="../utils/locale-utils.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
