<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClashFox</title>
    <script>
      (function(){
        try {
          var t = localStorage.getItem('lastTheme');
          if (t) {
            document.documentElement.setAttribute('data-theme', t);
            if (document.body) document.body.dataset.theme = t;
            else document.addEventListener('DOMContentLoaded', () => {
              document.body.dataset.theme = t;
            });
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="logs">
    <div class="app">
      <aside class="sidebar" id="menuContainer"></aside>

      <main class="content">
        <header class="topbar" id="topbarContainer"></header>

        <div id="contentRoot" class="content-root">
          <section id="logs" class="panel active">
          <div class="panel-grid">
            <div class="card card-full">
              <div class="card-header-row">
                <h3 data-i18n="logs.title">Kernel Logs</h3>
              </div>
              <div class="card-body">
                <div class="form-row logs-toolbar">
                  <div class="field-inline logs-level-filter">
                    <label for="logLevelFilter" data-i18n="logs.levelLabel">Level</label>
                    <select id="logLevelFilter">
                      <option value="debug">debug</option>
                      <option value="info" selected>info</option>
                      <option value="warn">warn</option>
                      <option value="error">error</option>
                      <option value="fatal">fatal</option>
                      <option value="trace">trace</option>
                    </select>
                  </div>
                  <div class="field-inline logs-msg-filter">
                    <label for="logMessageFilter" data-i18n="logs.msgLabel">MSG</label>
                    <label class="search-field-wrap">
                      <input id="logMessageFilter" class="search-field" type="search" data-i18n-placeholder="logs.searchPlaceholder" placeholder="Search message..." />
                    </label>
                  </div>
                </div>
                <div class="log-table-wrap">
                  <table class="log-table" id="logTable">
                    <thead>
                      <tr>
                        <th data-i18n="logs.tableDate">Date</th>
                        <th data-i18n="logs.tableLevel">Level</th>
                        <th data-i18n="logs.tableMessage">MSG</th>
                      </tr>
                    </thead>
                    <tbody id="logTableBody"></tbody>
                  </table>
                </div>
              </div>
            </div>
            <div class="card card-full">
              <div class="card-header-row">
                <h3 data-i18n="clean.title">Clean Logs</h3>
              </div>
              <div class="card-body">
                <div class="form-row logs-toolbar logs-clean-toolbar">
                  <div class="field-inline logs-level-filter">
                    <label for="cleanModeSelect" data-i18n="clean.modeLabel">Mode</label>
                    <select id="cleanModeSelect">
                      <option value="all" data-i18n="clean.all">Delete all backups</option>
                      <option value="7d" data-i18n="clean.7d">Keep last 7 days</option>
                      <option value="30d" data-i18n="clean.30d">Keep last 30 days</option>
                    </select>
                  </div>
                </div>
                <div class="action-row logs-clean-action">
                  <button class="btn" id="openAppLogBtn" type="button">Open App Log</button>
                  <button class="btn danger" id="cleanBtn" data-i18n="clean.action">Clean Logs</button>
                </div>
              </div>
            </div>
          </div>
        </section>
        </div>
      </main>
    </div>
    <div id="overlayRoot"></div>

    <script src="../utils/locale-utils.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
