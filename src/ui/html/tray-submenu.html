<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClashFox Tray Submenu</title>
  <link rel="stylesheet" href="../css/tray-menu.css" />
</head>
<body class="submenu-window">
  <div id="submenuRoot" class="submenu-root">
    <div id="submenuList" class="menu-list"></div>
    <div id="submenuScrollUpHint" class="submenu-scroll-hint submenu-scroll-hint-up" aria-hidden="true">
      <svg class="submenu-scroll-hint-chevron" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M3.5 10 8 5.5 12.5 10" />
      </svg>
    </div>
    <div id="submenuScrollDownHint" class="submenu-scroll-down-hint" aria-hidden="true">
      <svg class="submenu-scroll-hint-chevron" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M3.5 6 8 10.5 12.5 6" />
      </svg>
    </div>
  </div>
  <script src="../js/tray-submenu.js"></script>
</body>
</html>
