<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About ClashFox</title>
    <script>
      (function(){
        try {
          var t = localStorage.getItem('lastTheme');
          if (t) {
            document.documentElement.setAttribute('data-theme', t);
            if (document.body) document.body.dataset.theme = t;
            else document.addEventListener('DOMContentLoaded', () => {
              document.body.dataset.theme = t;
            });
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/about.css" />
  </head>
  <body>
    <div class="about-container">
      <div class="about-title">About ClashFox</div>
      <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>
      <div class="about-content">
        <div class="about-logo">
          <img class="logo-night" src="../assets/logo-night.png" alt="ClashFox logo" />
          <img class="logo-light" src="../assets/logo-light.png" alt="ClashFox logo" />
        </div>
        <div class="name">ClashFox-<span id="version">0.0.0</span></div>
        <div class="meta">Copyright © 2026 - By ClashFox Team. All rights reserved.</div>
      </div>
    </div>
    <script>
      (function () {
        const SETTINGS_KEY = 'clashfox-settings';
        let lastSystemDark = window.matchMedia
          ? window.matchMedia('(prefers-color-scheme: dark)').matches
          : true;
        const versionEl = document.getElementById('version');
        const closeBtn = document.getElementById('closeBtn');

        function resolveTheme(preference) {
          if (preference !== 'auto') {
            return preference;
          }
          return lastSystemDark ? 'night' : 'day';
        }

        function applyTheme(preference) {
          const theme = resolveTheme(preference);
          if (document.body) {
            document.body.dataset.theme = theme;
          }
          document.documentElement.setAttribute('data-theme', theme);
        }

        function readThemePreference() {
          try {
            const raw = localStorage.getItem(SETTINGS_KEY);
            if (!raw) {
              return 'auto';
            }
            const parsed = JSON.parse(raw);
            return parsed && parsed.themePreference ? parsed.themePreference : 'auto';
          } catch {
            return 'auto';
          }
        }

        function syncThemeFromSettings() {
          applyTheme(readThemePreference());
        }

        function updateLastSystemTheme(payload) {
          if (payload && typeof payload.dark === 'boolean') {
            lastSystemDark = payload.dark;
          }
        }

        function bindSystemThemeListeners() {
          if (window.matchMedia) {
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            mediaQuery.addEventListener('change', (event) => {
              lastSystemDark = Boolean(event.matches);
              if (readThemePreference() === 'auto') {
                applyTheme('auto');
              }
            });
          }
          if (window.clashfox && typeof window.clashfox.onSystemThemeChange === 'function') {
            window.clashfox.onSystemThemeChange((payload) => {
              updateLastSystemTheme(payload);
              if (readThemePreference() === 'auto') {
                applyTheme('auto');
              }
            });
          }
        }

        async function updateVersion() {
          if (!window.clashfox || typeof window.clashfox.getAppInfo !== 'function' || !versionEl) {
            return;
          }
          try {
            const res = await window.clashfox.getAppInfo();
            const display = res && res.ok && res.data
              ? (res.data.displayVersion || res.data.version || '0.0.0')
              : '0.0.0';
            versionEl.textContent = display;
          } catch {
            // ignore
          }
        }

        function handleClose() {
          window.close();
        }

        closeBtn?.addEventListener('click', handleClose);
        window.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            handleClose();
          }
        });

        window.addEventListener('storage', (event) => {
          if (event.key === SETTINGS_KEY) {
            syncThemeFromSettings();
          }
        });

        syncThemeFromSettings();
        bindSystemThemeListeners();
        updateVersion();
      })();
    </script>
  </body>
</html>
