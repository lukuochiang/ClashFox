name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta*"
      - "v*.*.*-rc*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options: [beta, rc, stable]
      tag:
        description: "Tag to build (e.g. v1.2.3 or v1.2.3-beta.1 or v1.2.3-rc.1). Empty = current ref"
        required: false

permissions:
  contents: "write"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          INPUT_TAG="${{ inputs.tag }}"
          if [[ -z "$INPUT_TAG" ]]; then
            INPUT_TAG="${GITHUB_REF_NAME}"
          fi

          CHANNEL="${{ inputs.channel }}"
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            if [[ "$INPUT_TAG" == *"-beta"* ]]; then
              CHANNEL="beta"
            elif [[ "$INPUT_TAG" == *"-rc"* ]]; then
              CHANNEL="rc"
            else
              CHANNEL="stable"
            fi
          fi

          VERSION="${INPUT_TAG#v}"
          RELEASE_NAME="ClashFox ${VERSION}"
          PRERELEASE="false"
          if [[ "$CHANNEL" == "beta" || "$CHANNEL" == "rc" ]]; then
            PRERELEASE="true"
          fi

          echo "input_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "release_channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.input_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Set package version from tag
        shell: bash
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version

      - name: Build mac packages
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CLASHFOX_RELEASE_CHANNEL: ${{ steps.meta.outputs.release_channel }}
        run: |
          set -euo pipefail
          npm run build:mac

      - name: Verify macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          EXPECTED_ZIP=(
            "ClashFox-${VERSION}-mac-x64.zip"
            "ClashFox-${VERSION}-mac-arm64.zip"
            "ClashFox-${VERSION}-mac-universal.zip"
          )
          EXPECTED_DMG=(
            "ClashFox-${VERSION}-mac-x64.dmg"
            "ClashFox-${VERSION}-mac-arm64.dmg"
            "ClashFox-${VERSION}-mac-universal.dmg"
          )

          echo "Checking expected macOS outputs..."
          find dist -type f \( -name "*.zip" -o -name "*.dmg" \) -print | sort

          for artifact in "${EXPECTED_ZIP[@]}"; do
            if ! find dist -type f -name "$artifact" | grep -q .; then
              echo "Missing expected artifact: $artifact"
              exit 1
            fi
          done
          for artifact in "${EXPECTED_DMG[@]}"; do
            if ! find dist -type f -name "$artifact" | grep -q .; then
              echo "Missing expected artifact: $artifact"
              exit 1
            fi
          done

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          if ! find dist -type f \( -name "*.zip" -o -name "*.dmg" \) | grep -q .; then
            echo "No macOS artifacts found under dist/"
            exit 1
          fi

          find dist -type f -name "*.zip" -exec cp -v {} artifacts/ \;
          find dist -type f -name "*.dmg" -exec cp -v {} artifacts/ \;
          find dist -type f -name "*.yml" \
            ! -name "builder-debug.yml" \
            ! -name "latest-mac.yml" \
            -exec cp -v {} artifacts/ \;

          printf '%s\n' "${{ steps.meta.outputs.version }}" > artifacts/version.txt
          ls -al artifacts

      - name: Create/Update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "artifacts/*"
          generateReleaseNotes: true
