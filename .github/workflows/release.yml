name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-alpha*"
      - "v*.*.*-beta*"
      - "v*.*.*-rc*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options: [beta, rc, stable]
      tag:
        description: "Tag to build (e.g. v1.2.3 or v1.2.3-beta.1 or v1.2.3-rc.1). Empty = current ref"
        required: false

permissions:
  contents: "write"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          INPUT_TAG="${{ inputs.tag }}"
          if [[ -z "$INPUT_TAG" ]]; then
            INPUT_TAG="${GITHUB_REF_NAME}"
          fi

          # Validate tag format
          if [[ ! "$INPUT_TAG" =~ ^v ]]; then
            echo "❌ Error: Invalid tag format '$INPUT_TAG'. Must start with 'v'"
            exit 1
          fi

          CHANNEL="${{ inputs.channel }}"
          # Always trust tag suffix when it encodes a release channel.
          # This avoids mismatches when workflow_dispatch keeps its default channel input.
          if [[ "$INPUT_TAG" == *"-beta"* ]]; then
            CHANNEL="beta"
          elif [[ "$INPUT_TAG" == *"-rc"* ]]; then
            CHANNEL="rc"
          elif [[ "$INPUT_TAG" == *"-alpha"* ]]; then
            CHANNEL="alpha"
          elif [[ "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
          else
            echo "⚠️ Warning: Tag '$INPUT_TAG' does not match any known channel pattern, defaulting to '$CHANNEL'"
          fi

          VERSION="${INPUT_TAG#v}"
          RELEASE_NAME="ClashFox ${VERSION}"
          PRERELEASE="false"
          if [[ "$CHANNEL" == "beta" || "$CHANNEL" == "rc" || "$CHANNEL" == "alpha" ]]; then
            PRERELEASE="true"
          fi

          echo "input_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "release_channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.input_tag }}

      - name: Extract changelog section
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"

          # Extract changelog from version title to next version title or end of file
          if awk "/### \[${VERSION}\]/,/^(### \[|$)/" CHANGELOG.md | sed '$d' > release-notes.md; then
            if [[ -s release-notes.md ]]; then
              echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
              cat release-notes.md >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              echo "✅ Changelog extracted successfully for version ${VERSION}"
            else
              echo "⚠️ No changelog content found for version ${VERSION}, using default message"
              echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
              echo "## Release ${VERSION}" >> $GITHUB_ENV
              echo "" >> $GITHUB_ENV
              echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details." >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            fi
          else
            echo "❌ Failed to extract changelog for version ${VERSION}, using default message"
            echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
            echo "## Release ${VERSION}" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details." >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Save version changelog
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p releases/$VERSION
          if npx conventional-changelog -p angular -r 1 > releases/$VERSION/changelog.md 2>&1; then
            echo "Conventional changelog generated successfully"
          else
            echo "⚠️ Failed to generate conventional changelog, skipping"
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details." > releases/$VERSION/changelog.md
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Set package version from tag
        shell: bash
        run: |
          set -euo pipefail
          TARGET_VERSION="${{ steps.meta.outputs.version }}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
            echo "package.json already at version $TARGET_VERSION; skipping npm version."
          else
            npm version "$TARGET_VERSION" --no-git-tag-version
          fi

      - name: Build mac packages
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CLASHFOX_RELEASE_CHANNEL: ${{ steps.meta.outputs.release_channel }}
        run: |
          set -euo pipefail
          npm run build:mac

      - name: Verify macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          EXPECTED_ZIP=(
            "ClashFox-${VERSION}-mac-x64.zip"
            "ClashFox-${VERSION}-mac-arm64.zip"
            "ClashFox-${VERSION}-mac-universal.zip"
          )
          EXPECTED_DMG=(
            "ClashFox-${VERSION}-mac-x64.dmg"
            "ClashFox-${VERSION}-mac-arm64.dmg"
            "ClashFox-${VERSION}-mac-universal.dmg"
          )

          echo "Checking expected macOS outputs..."
          find dist -type f \( -name "*.zip" -o -name "*.dmg" \) -print | sort

          for artifact in "${EXPECTED_ZIP[@]}"; do
            if ! find dist -type f -name "$artifact" | grep -q .; then
              echo "Missing expected artifact: $artifact"
              exit 1
            fi
          done
          for artifact in "${EXPECTED_DMG[@]}"; do
            if ! find dist -type f -name "$artifact" | grep -q .; then
              echo "Missing expected artifact: $artifact"
              exit 1
            fi
          done

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          if ! find dist -type f \( -name "*.zip" -o -name "*.dmg" \) | grep -q .; then
            echo "No macOS artifacts found under dist/"
            exit 1
          fi

          find dist -type f -name "*.zip" -exec cp -v {} artifacts/ \;
          find dist -type f -name "*.dmg" -exec cp -v {} artifacts/ \;
          find dist -type f -name "*.yml" \
            ! -name "builder-debug.yml" \
            ! -name "latest-mac.yml" \
            -exec cp -v {} artifacts/ \;

          printf '%s\n' "${{ steps.meta.outputs.version }}" > artifacts/version.txt
          ls -al artifacts

      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ steps.meta.outputs.version }}
          path: releases/
          retention-days: 90

      - name: Create/Update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "artifacts/*"
          body: ${{ env.RELEASE_BODY }}
